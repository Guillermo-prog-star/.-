name: Deploy if-backend → Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  # ── JOB 1: Verificación local antes de desplegar ─────────────────────────
  verify:
    name: Build & Test verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile backend (fail-fast antes de Railway)
        working-directory: backend
        run: mvn compile -q -Dmaven.test.skip=true

      - name: Verify migrations syntax
        working-directory: backend
        run: |
          echo "Verificando migraciones Flyway..."
          ls src/main/resources/db/migration/V*.sql | sort
          echo "Total de migraciones: $(ls src/main/resources/db/migration/V*.sql | wc -l)"

  # ── JOB 2: Despliegue en Railway (solo si verify pasa) ───────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        run: railway up --service if-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify deployment
        run: |
          echo "✅ Backend desplegado en Railway"
          echo "🔗 https://railway.app/dashboard"
          echo "📋 Migraciones Flyway se ejecutarán automáticamente al iniciar"
