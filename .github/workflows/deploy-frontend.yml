name: Deploy if-frontend to Vercel

on:
  push:
    branches:
      - principal
    paths:
      - 'if-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Type-check Angular
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: if-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: if-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular production
        run: npx ng build --configuration=production
        env:
          NODE_OPTIONS: --max_old_space_size=6144

      - name: Report bundle size
        run: |
          echo "📦 Tamaño del paquete generado:"
          du -sh dist/* 2>/dev/null || true

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: if-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: if-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes --confirm --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: team_qw3OrINJ6Lw0RiwfkdOeTWUp
          VERCEL_PROJECT_ID: prj_cHlnpSC000QBqYOpfujHuE70aBpV

      - name: Notify deployment
        run: |
          echo "✅ Frontend desplegado en Vercel"
          echo "🔗 https://if-full1.vercel.app"
