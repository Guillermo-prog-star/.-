name: Quality Gate — Tests + Coverage + SonarCloud

on:
  pull_request:
    branches: [main, principal]
    paths:
      - 'backend/**'
  push:
    branches: [main, principal]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  quality:
    name: Tests · JaCoCo · SonarCloud
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (historial completo para análisis "new code") ────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Cache SonarCloud ──────────────────────────────────────────────
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ── 4. Tests + JaCoCo + Sonar (todo en un solo mvn) ─────────────────
      - name: Build & Test (JaCoCo)
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          CLAUDE_API_KEY: test-key-not-used
          AI_PROVIDER: mock
        run: |
          mvn verify -P ci --no-transfer-progress || true

      - name: Print failed tests
        if: always()
        working-directory: backend
        run: |
          echo "=== RESUMEN SUREFIRE (archivos con errors/failures) ==="
          grep -hlE 'errors="[1-9]|failures="[1-9]' target/surefire-reports/TEST-*.xml 2>/dev/null || echo "Ninguno"
          echo ""
          echo "=== DETALLE ERRORES ==="
          for f in target/surefire-reports/TEST-*.xml; do
            if grep -qE 'errors="[1-9]|failures="[1-9]' "$f" 2>/dev/null; then
              echo "--- $f ---"
              grep -E '<testcase|<failure|<error' "$f" | head -30
              echo ""
            fi
          done

      - name: Fail if tests failed
        working-directory: backend
        run: |
          BAD=$(grep -lE 'errors="[1-9]|failures="[1-9]' target/surefire-reports/TEST-*.xml 2>/dev/null | wc -l)
          if [ "$BAD" -gt "0" ]; then
            echo "❌ Hay $BAD archivos con tests fallidos"
            exit 1
          fi
          echo "✅ Todos los tests pasaron"

      - name: Analyze with SonarCloud
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=guillermo-prog-star \
            -Dsonar.projectKey=Guillermo-prog-star_.- \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress

      # ── 4b. Subir surefire XMLs para diagnóstico de fallos en CI ────────
      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.run_number }}
          path: backend/target/surefire-reports/
          retention-days: 3

      # ── 5. Resultados de tests en GitHub (visible en la pestaña Checks) ──
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      # ── 6. Artefacto: reporte HTML de cobertura ──────────────────────────
      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ github.run_number }}
          path: backend/target/site/jacoco/
          retention-days: 14

      # ── 7. Resumen de cobertura en el PR ─────────────────────────────────
      - name: Coverage summary
        if: always()
        run: |
          REPORT="backend/target/site/jacoco/jacoco.xml"
          if [ ! -f "$REPORT" ]; then
            echo "⚠️ No se encontró el reporte JaCoCo" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          COVERED=$(grep -oP 'type="LINE".*?missed="\K[0-9]+' "$REPORT" | \
            awk -F'"' '{print $1}' | awk 'BEGIN{s=0}{s+=$1}END{print s}' || echo 0)
          MISSED=$(grep -oP 'type="LINE".*?missed="\K[0-9]+' "$REPORT" | \
            awk 'BEGIN{s=0}{s+=$1}END{print s}' || echo 0)

          # Parsing robusto: extraer totales del summary counter LINE
          COVERED=$(xmllint --xpath \
            'sum(//counter[@type="LINE"]/@covered)' \
            "$REPORT" 2>/dev/null || echo "N/A")
          MISSED=$(xmllint --xpath \
            'sum(//counter[@type="LINE"]/@missed)' \
            "$REPORT" 2>/dev/null || echo "N/A")

          echo "## 📊 Cobertura de código (JaCoCo)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Líneas cubiertas | $COVERED |" >> $GITHUB_STEP_SUMMARY
          echo "| Líneas no cubiertas | $MISSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Umbral CI (líneas) | ≥ 40% |" >> $GITHUB_STEP_SUMMARY
          echo "| Umbral CI (ramas) | ≥ 30% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Ver análisis completo en SonarCloud](https://sonarcloud.io/project/overview?id=Guillermo-prog-star_if-full)" >> $GITHUB_STEP_SUMMARY
