name: Quality Gate — Tests + Coverage + SonarCloud

on:
  pull_request:
    branches: [main, principal]
    paths:
      - 'backend/**'
  push:
    branches: [main, principal]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  quality:
    name: Tests · JaCoCo · SonarCloud
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (historial completo para análisis "new code") ────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Cache SonarCloud ──────────────────────────────────────────────
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ── 4. Tests + JaCoCo ────────────────────────────────────────────────
      - name: Build & Test (JaCoCo)
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          CLAUDE_API_KEY: test-key-not-used
          AI_PROVIDER: mock
        run: |
          mvn verify -P ci --no-transfer-progress 2>&1 | tee /tmp/maven-output.txt; exit ${PIPESTATUS[0]}

      # ── 5. SonarCloud ────────────────────────────────────────────────────
      - name: Analyze with SonarCloud
        working-directory: backend
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=guillermo-prog-star \
            -Dsonar.projectKey=Guillermo-prog-star_.- \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress

      # ── 6. Artefactos ────────────────────────────────────────────────────
      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: surefire-reports-${{ github.run_number }}
          path: backend/target/surefire-reports/
          retention-days: 3

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ github.run_number }}
          path: backend/target/site/jacoco/
          retention-days: 14
