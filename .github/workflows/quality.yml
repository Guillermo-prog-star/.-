name: Quality Gate — Tests + Coverage + SonarQube

on:
  pull_request:
    branches: [main, principal]
    paths:
      - 'backend/**'
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  quality:
    name: Tests · JaCoCo · SonarQube
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SonarQube necesita el historial completo para el análisis de "new code"
          fetch-depth: 0

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Cache SonarQube ───────────────────────────────────────────────
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # ── 4. Tests + JaCoCo report ─────────────────────────────────────────
      - name: Run tests with JaCoCo coverage
        working-directory: backend
        run: |
          mvn verify -P ci \
            --no-transfer-progress \
            -Dmaven.test.failure.ignore=false
        env:
          SPRING_PROFILES_ACTIVE: test

      # ── 5. Publicar resultados de tests en GitHub ─────────────────────────
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      # ── 6. SonarQube Analysis ────────────────────────────────────────────
      - name: SonarQube Analysis
        working-directory: backend
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=integrity-family-backend \
            -Dsonar.projectName="Integrity Family — Backend" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            --no-transfer-progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Publicar reporte de cobertura como artefacto ──────────────────
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

      # ── 8. Resumen en PR ─────────────────────────────────────────────────
      - name: Coverage summary
        if: always()
        run: |
          if [ -f backend/target/site/jacoco/jacoco.xml ]; then
            COVERED=$(grep -oP 'type="LINE"[^/]*/>' backend/target/site/jacoco/jacoco.xml | \
              grep -oP 'covered="\K[0-9]+' | awk '{s+=$1}END{print s}')
            MISSED=$(grep -oP 'type="LINE"[^/]*/>' backend/target/site/jacoco/jacoco.xml | \
              grep -oP 'missed="\K[0-9]+' | awk '{s+=$1}END{print s}')
            TOTAL=$(( COVERED + MISSED ))
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc)
              echo "## 📊 Cobertura de código" >> $GITHUB_STEP_SUMMARY
              echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
              echo "|---|---|" >> $GITHUB_STEP_SUMMARY
              echo "| Líneas cubiertas | $COVERED / $TOTAL |" >> $GITHUB_STEP_SUMMARY
              echo "| Cobertura de líneas | **${PCT}%** |" >> $GITHUB_STEP_SUMMARY
              echo "| Umbral mínimo (CI) | 40% |" >> $GITHUB_STEP_SUMMARY
            fi
          fi
