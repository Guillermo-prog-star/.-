spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: integrity-family
  datasource:
    url: jdbc:mysql://${DB_HOST:if-mysql}:${DB_PORT:3306}/${DB_NAME:integrity_family}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:if-rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        auto-startup: ${RABBITMQ_ENABLED:false}
    template:
      retry:
        enabled: false

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    rabbit:
      enabled: false

# ---------- Configuración de IA Refinada ----------
app:
  ai:
    voice:
      enabled: ${APP_AI_VOICE_ENABLED:false}
    anthropic:
      enabled: ${CLAUDE_ENABLED:true}
      api-key: ${CLAUDE_API_KEY:MOCK_KEY}
      model: ${CLAUDE_MODEL:claude-3-5-sonnet-20240620}
      base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com/v1}
    openai:
      api-key: ${OPENAI_API_KEY:MOCK_KEY}
      whisper:
        enabled: ${WHISPER_ENABLED:false}
        url: ${APP_AI_OPENAI_WHISPER_URL:https://api.openai.com/v1/audio/transcriptions}
        model: ${APP_AI_OPENAI_WHISPER_MODEL:whisper-1}
        timeout-ms: ${APP_AI_OPENAI_WHISPER_TIMEOUT_MS:30000}
    elevenlabs:
      enabled: ${ELEVENLABS_ENABLED:false}
      api-key: ${ELEVENLABS_API_KEY:MOCK_KEY}
      voice-id: ${ELEVENLABS_VOICE_ID:MOCK_VOICE}
      model: ${ELEVENLABS_MODEL:eleven_multilingual_v2}
      base-url: ${ELEVENLABS_BASE_URL:https://api.elevenlabs.io/v1}

logging:
  level:
    com.integrityfamily: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: DEBUG
  file:
    name: /app/logs/backend.log

# ---------- Configuración de Seguridad JWT ----------
integrity:
  security:
    jwt:
      secret: ${JWT_SECRET:aW50ZWdyaXR5RmFtaWx5U2VjcmV0S2V5Rm9yVGhlVW5pZmllZEludGVncml0eUVuZ2luZTIwMjY=}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}


---
# Perfil 'voice': activa toda la cadena de IA por voz
spring:
  config:
    activate:
      on-profile: voice
app:
  ai:
    voice:
      enabled: true
    openai:
      whisper:
        enabled: true
    elevenlabs:
      enabled: true
