server:
  port: 8080
  address: 0.0.0.0

spring:
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:mysql://localhost:3307/integrity_family?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoint:
    health:
      show-details: always

app:
  rabbit:
    enabled: true
  messaging:
    exchange: if.exchange
    queues:
      assessment: if.assessment.queue
      audit: if.audit.queue
      risk: if.risk.queue
      plan: if.plan.queue