# BD de integración: MySQL local (integrity-db en Docker puerto 3307)
# La URL real se inyecta via @DynamicPropertySource en el test
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway sobre MySQL real
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# RabbitMQ desactivado — se mockea con @MockBean
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# JWT
security.jwt.secret=integration-test-secret-key-minimum-32-chars!!
security.jwt.expiration=3600000

# IA — sin llamadas reales
ai.provider=mock
claude.api.key=test-key-not-used
