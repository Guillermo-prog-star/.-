# docker-compose.prod.yml — override de producción
# Uso: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Variables de entorno requeridas en .env (ver .env.example):
#   JWT_SECRET, DB_PASSWORD, APP_CORS_ALLOWED_ORIGINS, CLAUDE_API_KEY

services:

  if-mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    # No exponer el puerto de base de datos hacia el host en producción
    ports: !reset []

  if-backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es obligatorio en producción}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio en producción}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS es obligatorio en producción}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      SERVER_ERROR_INCLUDE_MESSAGE: never
      SERVER_ERROR_INCLUDE_BINDING_ERRORS: never
    restart: always
    # Backend no debe estar expuesto directamente; nginx hace de proxy
    ports: !reset []

  if-frontend:
    build:
      context: ./if-frontend
      dockerfile: Dockerfile.prod
    restart: always
    # En producción, nginx sirve en el puerto 80
    ports:
      - "80:80"
    # Sin volúmenes de hot-reload en producción
    volumes: !reset []
    environment: !reset []
    # El frontend ya no depende de BACKEND_URL: nginx usa el nombre de servicio interno
    depends_on:
      if-backend:
        condition: service_healthy
