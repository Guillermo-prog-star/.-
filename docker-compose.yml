services:
  if-frontend:
    build: ./frontend
    container_name: if-frontend
    ports:
      - "4200:4200" # Mismo puerto fuera y dentro
    restart: always
    networks:
      - if-net

  if-backend:
    build: ./backend
    container_name: if-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://if-mysql:3306/integrity_family
    networks:
      - if-net
    depends_on:
      if-mysql:
        condition: service_healthy

  if-mysql:
    image: mysql:8.4
    container_name: if-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: integrity_family
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 5
    networks:
      - if-net

networks:
  if-net:
    driver: bridge