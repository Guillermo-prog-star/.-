<div class="wrap">
  <div class="box">
    <div class="logo">IF</div>
    <h1>Integrity Family</h1>
    <p class="sub">Sistema de bienestar familiar con IA</p>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          required
        />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          required
        />
      </div>

      @if (error) {
        <div class="err">{{ error }}</div>
      }

      <button
        type="submit"
        class="btn btn-primary"
        style="width:100%; justify-content:center; padding:12px;"
        [disabled]="loading"
      >
        {{ loading ? 'Ingresando...' : 'Ingresar al sistema' }}
      </button>
    </form>

    <div class="footer">
      ¿No tienes cuenta?
      <a
        routerLink="/register"
        style="color:var(--green); font-weight:600;"
      >
        Registrarse
      </a>
    </div>

    <div class="footer" style="margin-top:8px; font-size:11px;">
      Demo: admin&#64;integrityfamily.com / Admin123*
    </div>
  </div>
</div>
