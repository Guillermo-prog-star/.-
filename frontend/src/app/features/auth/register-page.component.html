<div class="bg-auth-gradient">
  <div class="glass-card">
    <div class="logo-badge">IF</div>
    <h1 class="text-center mb-24">Crear cuenta</h1>
    
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nombre completo</label>
        <input [(ngModel)]="fullName" name="fn" required placeholder="Ej: William López"/>
      </div>
      
      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" name="em" type="email" required placeholder="william@ejemplo.com"/>
      </div>
      
      <div class="form-group">
        <label>Contraseña (mín. 8 caracteres)</label>
        <input [(ngModel)]="password" name="pw" type="password" required minlength="8" placeholder="********"/>
      </div>

      <div *ngIf="error" class="err-box">{{ error }}</div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading">
        {{ loading ? 'Procesando...' : 'Registrar Nodo' }}
      </button>
    </form>

    <p class="text-center mt-16 text-muted">
      ¿Ya tienes cuenta? <a routerLink="/login">Ingresar</a>
    </p>
  </div>
</div>
