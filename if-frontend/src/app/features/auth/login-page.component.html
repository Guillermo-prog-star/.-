<div class="wrap">
  <div class="glass-box">
    <div class="logo">IF</div>
    <h1>Integrity Family</h1>
    <p class="sub">Fortaleciendo familias</p>

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="tu@correo.com"
          required
        />
      </div>

      <div class="form-group">
        <label class="password-label">
          Contraseña
          <button type="button" class="toggle-password" (click)="togglePassword()">
            {{ showPassword ? 'Ocultar' : 'Ver' }}
          </button>
        </label>
        <input
          [(ngModel)]="password"
          name="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
          <span>Recordar mis datos</span>
        </label>
        <a href="#" class="forgot-link" (click)="$event.preventDefault()">¿Olvidaste tu contraseña?</a>
      </div>

      @if (error) {
        <div class="err">{{ error }}</div>
      }

      <button
        type="submit"
        class="btn-primary"
        [disabled]="loading"
      >
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <div class="secure-info">
      🔒 Tu información está protegida.
    </div>

    <div class="divider"></div>

    <div class="footer">
      ¿Eres nuevo? <a routerLink="/register">Crea tu cuenta familiar</a>
    </div>

    <div class="footer-legal">
      <a href="#" (click)="$event.preventDefault()">Privacidad</a> · 
      <a href="#" (click)="$event.preventDefault()">Términos de uso</a>
    </div>
  </div>
</div>
