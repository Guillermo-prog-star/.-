<div class="bg-auth-gradient">
  <div class="glass-card">
    <div class="logo-badge">IF</div>
    <h1 class="text-center mb-24">Crear cuenta</h1>
    
    <div class="flex gap-4 mb-20 border-b border-white/10 pb-2">
      <button (click)="setMode('VOUCHER')" 
              [class.text-indigo-400]="mode === 'VOUCHER'"
              [class.border-b-2]="mode === 'VOUCHER'"
              class="text-xs uppercase font-bold tracking-wider px-2 py-1">Unirse</button>
      <button (click)="setMode('NEW_FAMILY')" 
              [class.text-indigo-400]="mode === 'NEW_FAMILY'"
              [class.border-b-2]="mode === 'NEW_FAMILY'"
              class="text-xs uppercase font-bold tracking-wider px-2 py-1">Crear Familia</button>
    </div>
    
    <form (ngSubmit)="submit()">
      <div *ngIf="mode === 'NEW_FAMILY'" class="form-group mb-20">
        <label>Nombre de tu Familia</label>
        <input [(ngModel)]="familyName" name="fnm" required placeholder="Ej: Familia López-García"/>
        <small class="text-[9px] text-white/40 italic">Este nombre identificará a tu núcleo familiar.</small>
      </div>

      <div class="form-group">
        <label>Nombre completo</label>
        <input [(ngModel)]="fullName" name="fn" required placeholder="Ej: William López"/>
      </div>
      
      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" name="em" type="email" required placeholder="william@ejemplo.com"/>
      </div>

      <!-- Campo Crítico: Voucher para Fase Alfa -->
      <div *ngIf="mode === 'VOUCHER'" class="form-group mb-20">
        <label class="flex justify-between">
          Voucher de Inmersión
          <span class="text-[9px] uppercase text-indigo-400 font-bold">Fase Alfa</span>
        </label>
        <input [(ngModel)]="voucher" name="vc" 
               class="border-indigo-500/30 focus:border-indigo-500"
               placeholder="Ej: ALFA-XXXXXX" />
        <small class="text-[9px] text-white/40 italic">Ingresa tu código único para activar tu núcleo familiar.</small>
      </div>
      
      <div class="form-group">
        <label>Contraseña</label>
        <input [(ngModel)]="password" name="pw" type="password" required minlength="8" placeholder="********"/>
      </div>

      <div *ngIf="error" class="err-box">{{ error }}</div>

      <button type="submit" class="btn btn-primary w-full mt-8" [disabled]="loading">
        {{ loading ? 'Sincronizando Nodo...' : (mode === 'VOUCHER' ? 'Crear Cuenta y Activar' : 'Registrar Familia y Admin') }}
      </button>
    </form>


    <p class="text-center mt-16 text-muted">
      ¿Ya tienes cuenta? <a routerLink="/login">Ingresar</a>
    </p>
  </div>
</div>
