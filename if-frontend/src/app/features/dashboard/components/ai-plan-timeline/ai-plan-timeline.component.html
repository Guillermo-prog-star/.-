<div class="timeline-container glass-dark p-8 rounded-3xl border border-white/10 overflow-hidden relative">
  <div class="absolute top-0 right-0 p-4">
    <span class="bg-indigo-500/20 text-indigo-400 text-[10px] font-bold px-2 py-1 rounded-full border border-indigo-500/30">IA PROSPECTIVA</span>
  </div>
  
  <h3 class="text-xl font-bold mb-10 text-white/90">Misiones de Transformación</h3>
  
  <div class="relative flex justify-between items-center px-10 min-h-[150px]">
    <!-- Connecting Line -->
    <div class="absolute top-1/2 left-0 w-full h-0.5 bg-gradient-to-r from-teal-500/50 via-indigo-500/50 to-purple-500/50 -translate-y-1/2 z-0"></div>
    
    <div *ngFor="let action of actions; let i = index" 
         class="relative z-10 flex flex-col items-center group cursor-pointer"
         (click)="toggleComplete(action)">
      <div class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-500 border-2"
           [ngClass]="action.completed ? 'bg-indigo-600 border-indigo-400 shadow-[0_0_20px_rgba(99,102,241,0.6)]' : 'bg-slate-800 border-slate-600 group-hover:border-slate-400'">
        <span class="text-2xl">{{ getIconForDimension(action.dimension) }}</span>
      </div>
      <div class="mt-4 text-center max-w-[120px]">
        <span class="block text-[10px] font-bold text-white/40 uppercase tracking-tighter">{{ action.dimension }}</span>
        <span class="block text-xs font-semibold text-white/80 mt-1 line-clamp-2">{{ action.description }}</span>
      </div>
      
      <!-- Tooltip-like details on hover -->
      <div class="absolute -bottom-20 bg-slate-900/90 backdrop-blur-md border border-white/10 p-3 rounded-xl opacity-0 translate-y-4 pointer-events-none transition-all duration-300 group-hover:opacity-100 group-hover:translate-y-0 w-48 text-center z-20">
        <p class="text-[10px] text-white/60 mb-1 uppercase">Misión del Mentor</p>
        <p class="text-xs text-indigo-300">{{ action.description }}</p>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="actions.length === 0" class="w-full text-center py-10">
        <p class="text-white/30 italic">Esperando que el Mentor defina las próximas misiones...</p>
    </div>
  </div>
</div>
