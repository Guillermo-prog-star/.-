services:
  - type: web
    name: if-full
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: RABBITMQ_ENABLED
        value: "false"
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "http://localhost:4200,http://127.0.0.1:4200,https://if-frontend-nine.vercel.app,https://if-full1.vercel.app,https://if-full1.vercel.app/"
