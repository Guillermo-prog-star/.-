sonar.projectKey=integrity-family-backend
sonar.projectName=Integrity Family — Backend
sonar.projectVersion=1.0.0

sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# Reporte de cobertura generado por JaCoCo
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Exclusiones: entidades de dominio, DTOs y configs no tienen lógica de negocio
sonar.exclusions=\
  backend/src/main/java/**/domain/**/*,\
  backend/src/main/java/**/config/**/*,\
  backend/src/main/java/**/dto/**/*,\
  backend/src/main/java/**/*Application.java,\
  backend/src/main/java/**/exception/**/*

sonar.cpd.exclusions=\
  backend/src/main/java/**/dto/**/*,\
  backend/src/main/java/**/domain/**/*

# Quality Gate personalizado — umbrales iniciales conservadores
# New code: 80% coverage, 0 blocker/critical bugs
sonar.qualitygate.wait=true

sonar.sourceEncoding=UTF-8
sonar.java.source=17
